---
# Forked from Netcracker/.github workflow-templates/pr-conventional-commits.yaml.

name: Conventional Commits PR Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

concurrency:
  group: pr-conventional-commits-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: read

jobs:
  build:
    name: "Conventional Commits Check"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Conventional Commits Check"
        uses: webiny/action-conventional-commits@7f91b1595ca1951cdb671ddc9f07a49081ec5b69 # v1.4.2
