# This workflow builds and tests the Go project.
# Forked from Netcracker/.github workflow-templates/go-build.yaml.
# The SonarCloud step from the template is dropped: this repo has no Sonar
# project, and the checks below mirror the retired ci.yml (build, vet, test,
# gofmt).
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build Go Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency:
  group: go-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "Build and Test Go Project"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Set up Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: "Check formatting"
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: "Vet"
        run: go vet ./...

      - name: "Build"
        run: go build -v ./...

      - name: "Test"
        run: go test ./...
