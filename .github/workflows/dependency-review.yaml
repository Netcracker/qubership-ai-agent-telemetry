---

# Forked from Netcracker/.github workflow-templates/dependency-review.yaml.
# Runs GitHub's native dependency review on pull requests (and on demand).

name: 'Dependency Review'
on: [pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: "Get the first commit SHA"
        if: github.event_name == 'workflow_dispatch'
        id: first-commit
        run: echo "first_commit_sha=$(git rev-list --max-parents=0 HEAD)" >> "$GITHUB_ENV"
      - name: 'Dependency Review (manual)'
        if: github.event_name == 'workflow_dispatch'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ env.first_commit_sha }}
          head-ref: ${{ github.ref }}
          show-openssf-scorecard: true
          vulnerability-check: true
          license-check: true
          warn-only: true
      - name: 'Dependency Review (pull_request)'
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          show-openssf-scorecard: true
          vulnerability-check: true
          license-check: true
